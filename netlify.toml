# ── Netlify — Jules Adventure CM1 ──────────────────────────────

# Sert App_Jules_Tablette.html à la racine (URL propre)
[[redirects]]
  from = "/"
  to   = "/App_Jules_Tablette.html"
  status = 200

# ── En-têtes de cache ───────────────────────────────────────────

# HTML, SW et manifest : jamais mis en cache (toujours la version fraîche)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Images WebP : cache long terme (elles ne changent pas souvent)
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
